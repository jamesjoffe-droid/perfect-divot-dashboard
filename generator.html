<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Generator | The Perfect Divot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3f 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 15px;
        }
        
        h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 16px;
        }
        
        .filter-section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        
        .filter-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }
        
        @media (max-width: 768px) {
            .filter-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        .filter-group label {
            display: block;
            font-weight: 600;
            color: #1a472a;
            margin-bottom: 8px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .filter-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        
        .filter-group select:focus {
            outline: none;
            border-color: #1a472a;
        }
        
        .toggle-row {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .toggle-group {
            display: flex;
            background: #f5f5f5;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .toggle-group label {
            font-weight: 600;
            color: #1a472a;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            background: #e8e8e8;
        }
        
        .toggle-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            transition: all 0.2s;
        }
        
        .toggle-btn.active {
            background: #1a472a;
            color: white;
        }
        
        .toggle-btn:hover:not(.active) {
            background: #ddd;
        }
        
        .generate-btn {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 20px auto 0;
            padding: 14px 28px;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3f 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(26, 71, 42, 0.4);
        }
        
        .script-output {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        
        .script-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0f0f0;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .script-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a472a;
        }
        
        .script-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .meta-tag {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .meta-tag.length {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .meta-tag.style-analytical {
            background: #e3f2fd;
            color: #1565c0;
        }
        
        .meta-tag.style-hype {
            background: #fff3e0;
            color: #e65100;
        }
        
        .meta-tag.words {
            background: #f3e5f5;
            color: #7b1fa2;
        }
        
        .captions-section {
            background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #ffc107;
        }
        
        .captions-label {
            font-size: 12px;
            font-weight: 700;
            color: #f57c00;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .captions-label::before {
            content: "📱";
        }
        
        .caption-item {
            background: white;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: relative;
        }
        
        .caption-item:last-child {
            margin-bottom: 0;
        }
        
        .caption-number {
            position: absolute;
            top: -8px;
            left: -8px;
            width: 24px;
            height: 24px;
            background: #ff9800;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
        }
        
        .caption-text {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            padding-left: 12px;
        }
        
        .caption-timing {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
            padding-left: 12px;
        }
        
        .script-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #1a472a;
        }
        
        .script-label {
            font-size: 12px;
            font-weight: 700;
            color: #1a472a;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .script-label::before {
            content: "🎙️";
        }
        
        .script-text {
            font-size: 17px;
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;
        }
        
        .script-text .pause {
            color: #888;
            font-style: italic;
        }
        
        .copy-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            padding: 12px 24px;
            background: #1a472a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        
        .copy-btn:hover {
            background: #2d5a3f;
        }
        
        .copy-btn.copied {
            background: #4caf50;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state h3 {
            margin-bottom: 8px;
            color: #1a472a;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link:hover {
            color: white;
        }
    </style>
</head>

        function generateScript() {
            const hookType = document.getElementById('hookType').value;
            const angle = document.getElementById('angle').value;
            const length = document.getElementById('length').value;
            const style = document.getElementById('style').value;
            
            const hookLabels = {
                identity: 'Identity Callout',
                frustration: 'Shared Frustration',
                question: 'Question Hook',
                tip: 'Quick Tip',
                bold: 'Bold Statement'
            };
            
            const angleLabels = {
                general: 'General',
                feel: 'Feel & Contact',
                practice: 'Practice & Improvement',
                portability: 'Portability',
                value: 'Value & Price'
            };
            
            const styleLabels = {
                analytical: 'Analytical',
                hype: 'Hype'
            };
            
            const scriptData = scripts[style][hookType][angle][length];
            const wordCount = scriptData.script.split(/\s+/).length;
            
            let captionsHTML = '';
            scriptData.captions.forEach((caption, index) => {
                captionsHTML += `
                    <div class="caption-item">
                        <span class="caption-number">${index + 1}</span>
                        <div class="caption-text">${caption.text}</div>
                        <div class="caption-timing">${caption.timing}</div>
                    </div>
                `;
            });
            
            const output = document.getElementById('output');
            output.innerHTML = `
                <div class="script-header">
                    <div class="script-title">${hookLabels[hookType]} × ${angleLabels[angle]}</div>
                    <div class="script-meta">
                        <span class="meta-tag length">~${length}s</span>
                        <span class="meta-tag style-${style}">${styleLabels[style]}</span>
                        <span class="meta-tag words">~${wordCount} words</span>
                    </div>
                </div>
                
                <div class="captions-section">
                    <div class="captions-label">On-Screen Captions</div>
                    ${captionsHTML}
                </div>
                
                <div class="script-section">
                    <div class="script-label">Spoken Script</div>
                    <div class="script-text">${scriptData.script}</div>
                </div>
                
                <button class="copy-btn" onclick="copyScript()">
                    📋 Copy Full Script
                </button>
            `;
        }
        
        function copyScript() {
            const hookType = document.getElementById('hookType').value;
            const angle = document.getElementById('angle').value;
            const length = document.getElementById('length').value;
            const style = document.getElementById('style').value;
            
            const scriptData = scripts[style][hookType][angle][length];
            
            let fullText = '=== ON-SCREEN CAPTIONS ===\n\n';
            scriptData.captions.forEach((caption, index) => {
                fullText += `${index + 1}. ${caption.text} (${caption.timing})\n`;
            });
            fullText += '\n=== SPOKEN SCRIPT ===\n\n';
            fullText += scriptData.script;
            
            navigator.clipboard.writeText(fullText).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.innerHTML = '✅ Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = '📋 Copy Full Script';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }
        
        // Generate initial script on load
        window.onload = generateScript;
    </script>
